<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#111111" rx="16" />
  
  <text x="200" y="40" font-family="sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">The Old Way (Misaligned)</text>
  <rect x="50" y="60" width="300" height="280" fill="#222" rx="8" stroke="#444" stroke-width="2" />
  <rect x="70" y="80" width="260" height="120" fill="#333" rx="4" />
  <rect x="70" y="220" width="260" height="100" fill="#333" rx="4" />
  <text x="200" y="140" font-family="sans-serif" font-size="16" fill="#888" text-anchor="middle">Title</text>
  <text x="200" y="270" font-family="sans-serif" font-size="16" fill="#888" text-anchor="middle">Content</text>
  
  <text x="600" y="40" font-family="sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Subgrid (Perfect Alignment)</text>
  <rect x="450" y="60" width="300" height="280" fill="#222" rx="8" stroke="#2563eb" stroke-width="2" />
  
  <!-- Parent Grid Lines -->
  <line x1="450" y1="180" x2="750" y2="180" stroke="#2563eb" stroke-dasharray="4 4" stroke-width="1" />
  <line x1="450" y1="260" x2="750" y2="260" stroke="#2563eb" stroke-dasharray="4 4" stroke-width="1" />

  <rect x="470" y="80" width="260" height="90" fill="#333" rx="4" />
  <rect x="470" y="190" width="260" height="60" fill="#333" rx="4" />
  <rect x="470" y="270" width="260" height="50" fill="#333" rx="4" />

  <text x="600" y="130" font-family="sans-serif" font-size="16" fill="#888" text-anchor="middle">Title Header</text>
  <text x="600" y="225" font-family="sans-serif" font-size="16" fill="#888" text-anchor="middle">Content Body</text>
  <text x="600" y="300" font-family="sans-serif" font-size="16" fill="#888" text-anchor="middle">Footer</text>

</svg>
