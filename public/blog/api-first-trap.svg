<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#171717"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)"/>
  
  <!-- API built with no users -->
  <g transform="translate(150, 60)">
    <rect x="0" y="0" width="200" height="160" rx="8" fill="#1a1a1a" stroke="#3b82f6" stroke-width="2"/>
    <text x="100" y="25" font-family="monospace" font-size="12" fill="#3b82f6" text-anchor="middle">Perfect API</text>
    <text x="15" y="50" font-family="monospace" font-size="8" fill="#22c55e">✓ REST endpoints</text>
    <text x="15" y="70" font-family="monospace" font-size="8" fill="#22c55e">✓ GraphQL alternative</text>
    <text x="15" y="90" font-family="monospace" font-size="8" fill="#22c55e">✓ Rate limiting</text>
    <text x="15" y="110" font-family="monospace" font-size="8" fill="#22c55e">✓ Python SDK</text>
    <text x="15" y="130" font-family="monospace" font-size="8" fill="#22c55e">✓ JavaScript SDK</text>
    <text x="15" y="150" font-family="monospace" font-size="8" fill="#ef4444">✗ Zero users</text>
  </g>
  
  <!-- Users question mark -->
  <g transform="translate(450, 100)">
    <circle cx="60" cy="60" r="55" fill="#27272a" stroke="#555" stroke-width="2" stroke-dasharray="5"/>
    <text x="60" y="70" font-family="monospace" font-size="40" fill="#555" text-anchor="middle">?</text>
    <text x="60" y="95" font-family="monospace" font-size="8" fill="#555" text-anchor="middle">imaginary users</text>
  </g>
  
  <!-- Time wasted -->
  <g transform="translate(250, 260)">
    <rect x="0" y="0" width="300" height="80" rx="6" fill="#1a1a1a" stroke="#ef4444" stroke-width="1"/>
    <text x="150" y="25" font-family="monospace" font-size="10" fill="#ef4444" text-anchor="middle">3 months of work</text>
    <text x="150" y="50" font-family="monospace" font-size="8" fill="#888" text-anchor="middle">Technically excellent</text>
    <text x="150" y="70" font-family="monospace" font-size="8" fill="#f97316" text-anchor="middle">Solved nobody's problem</text>
  </g>
  
  <!-- Better approach -->
  <g transform="translate(600, 260)">
    <rect x="0" y="0" width="140" height="80" rx="6" fill="#27272a" stroke="#22c55e" stroke-width="1"/>
    <text x="70" y="25" font-family="monospace" font-size="9" fill="#22c55e" text-anchor="middle">Better Way</text>
    <text x="15" y="50" font-family="monospace" font-size="8" fill="#888">1. Build UI first</text>
    <text x="15" y="70" font-family="monospace" font-size="8" fill="#888">2. Get real users</text>
  </g>
  
  <text x="400" y="385" font-family="system-ui, sans-serif" font-size="12" fill="#555" text-anchor="middle">Build for real users, not imaginary ones</text>
</svg>