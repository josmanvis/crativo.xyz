<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#171717"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)"/>
  
  <!-- Edge function nodes -->
  <g transform="translate(100, 100)">
    <rect x="0" y="0" width="80" height="60" rx="6" fill="#27272a" stroke="#f97316" stroke-width="2"/>
    <text x="40" y="25" font-family="monospace" font-size="8" fill="#f97316" text-anchor="middle">Edge 1</text>
    <text x="40" y="45" font-family="monospace" font-size="7" fill="#22c55e" text-anchor="middle">✓ Fast</text>
  </g>
  <g transform="translate(200, 120)">
    <rect x="0" y="0" width="80" height="60" rx="6" fill="#27272a" stroke="#f97316" stroke-width="2"/>
    <text x="40" y="25" font-family="monospace" font-size="8" fill="#f97316" text-anchor="middle">Edge 2</text>
    <text x="40" y="45" font-family="monospace" font-size="7" fill="#22c55e" text-anchor="middle">✓ Global</text>
  </g>
  
  <!-- VPS still needed -->
  <g transform="translate(550, 100)">
    <rect x="0" y="0" width="140" height="100" rx="8" fill="#1a1a1a" stroke="#3b82f6" stroke-width="2"/>
    <text x="70" y="25" font-family="monospace" font-size="10" fill="#3b82f6" text-anchor="middle">VPS</text>
    <text x="70" y="50" font-family="monospace" font-size="8" fill="#888" text-anchor="middle">WebSockets</text>
    <text x="70" y="65" font-family="monospace" font-size="8" fill="#888" text-anchor="middle">Background Jobs</text>
    <text x="70" y="80" font-family="monospace" font-size="8" fill="#888" text-anchor="middle">Long Processes</text>
  </g>
  
  <!-- Database connection issue -->
  <g transform="translate(300, 250)">
    <rect x="0" y="0" width="200" height="80" rx="6" fill="#1a1a1a" stroke="#ef4444" stroke-width="2"/>
    <text x="100" y="25" font-family="monospace" font-size="9" fill="#ef4444" text-anchor="middle">⚠ Database Connection</text>
    <text x="100" y="45" font-family="monospace" font-size="8" fill="#888" text-anchor="middle">New connection per request</text>
    <text x="100" y="65" font-family="monospace" font-size="8" fill="#f97316" text-anchor="middle">80% time in connecting</text>
  </g>
  
  <!-- Cost comparison -->
  <g transform="translate(100, 300)">
    <rect x="0" y="0" width="150" height="60" rx="4" fill="#27272a" stroke="#555"/>
    <text x="75" y="20" font-family="monospace" font-size="9" fill="#888" text-anchor="middle">Before: $20/mo</text>
    <text x="75" y="40" font-family="monospace" font-size="9" fill="#22c55e" text-anchor="middle">After: $37/mo 😅</text>
  </g>
  
  <text x="400" y="380" font-family="system-ui, sans-serif" font-size="12" fill="#555" text-anchor="middle">Hybrid architecture won</text>
</svg>