<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="bar-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.08">
    <circle cx="40" cy="40" r="1" fill="#fff"/>
    <circle cx="100" cy="40" r="1" fill="#fff"/>
    <circle cx="160" cy="40" r="1" fill="#fff"/>
    <circle cx="220" cy="40" r="1" fill="#fff"/>
    <circle cx="280" cy="40" r="1" fill="#fff"/>
    <circle cx="340" cy="40" r="1" fill="#fff"/>
    <circle cx="400" cy="40" r="1" fill="#fff"/>
    <circle cx="460" cy="40" r="1" fill="#fff"/>
    <circle cx="520" cy="40" r="1" fill="#fff"/>
    <circle cx="580" cy="40" r="1" fill="#fff"/>
    <circle cx="640" cy="40" r="1" fill="#fff"/>
    <circle cx="700" cy="40" r="1" fill="#fff"/>
    <circle cx="760" cy="40" r="1" fill="#fff"/>
    <circle cx="40" cy="360" r="1" fill="#fff"/>
    <circle cx="100" cy="360" r="1" fill="#fff"/>
    <circle cx="160" cy="360" r="1" fill="#fff"/>
    <circle cx="220" cy="360" r="1" fill="#fff"/>
    <circle cx="280" cy="360" r="1" fill="#fff"/>
    <circle cx="340" cy="360" r="1" fill="#fff"/>
    <circle cx="400" cy="360" r="1" fill="#fff"/>
    <circle cx="460" cy="360" r="1" fill="#fff"/>
    <circle cx="520" cy="360" r="1" fill="#fff"/>
    <circle cx="580" cy="360" r="1" fill="#fff"/>
    <circle cx="640" cy="360" r="1" fill="#fff"/>
    <circle cx="700" cy="360" r="1" fill="#fff"/>
    <circle cx="760" cy="360" r="1" fill="#fff"/>
  </g>

  <!-- App window frame -->
  <rect x="80" y="50" width="640" height="300" rx="12" fill="#161b22" stroke="#30363d" stroke-width="2"/>

  <!-- Window title bar -->
  <rect x="80" y="50" width="640" height="36" rx="12" fill="#21262d"/>
  <rect x="80" y="74" width="640" height="12" fill="#21262d"/>
  <circle cx="104" cy="68" r="6" fill="#ff5f57"/>
  <circle cx="124" cy="68" r="6" fill="#febc2e"/>
  <circle cx="144" cy="68" r="6" fill="#28c840"/>
  <text x="400" y="72" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="12">MTMR Designer</text>

  <!-- Left panel: Element palette -->
  <rect x="82" y="88" width="140" height="260" fill="#0d1117"/>
  <text x="100" y="110" fill="#8b949e" font-family="system-ui" font-size="10" font-weight="600">ELEMENTS</text>

  <!-- Palette items -->
  <rect x="92" y="120" width="120" height="28" rx="6" fill="#1e293b" stroke="#30363d" stroke-width="1"/>
  <text x="108" y="138" fill="#e6edf3" font-family="system-ui" font-size="11">Escape</text>

  <rect x="92" y="154" width="120" height="28" rx="6" fill="#1e293b" stroke="#30363d" stroke-width="1"/>
  <text x="108" y="172" fill="#e6edf3" font-family="system-ui" font-size="11">Battery</text>

  <rect x="92" y="188" width="120" height="28" rx="6" fill="#1e293b" stroke="#30363d" stroke-width="1"/>
  <text x="108" y="206" fill="#e6edf3" font-family="system-ui" font-size="11">Music</text>

  <rect x="92" y="222" width="120" height="28" rx="6" fill="#1e293b" stroke="#30363d" stroke-width="1"/>
  <text x="108" y="240" fill="#e6edf3" font-family="system-ui" font-size="11">Weather</text>

  <rect x="92" y="256" width="120" height="28" rx="6" fill="#1e293b" stroke="#30363d" stroke-width="1"/>
  <text x="108" y="274" fill="#e6edf3" font-family="system-ui" font-size="11">CPU</text>

  <!-- Center: Touch Bar preview -->
  <rect x="224" y="88" width="340" height="260" fill="#0f172a"/>

  <text x="394" y="115" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="10" font-weight="600">TOUCH BAR PREVIEW</text>

  <!-- Touch Bar mockup -->
  <rect x="244" y="140" width="300" height="52" rx="26" fill="#000" stroke="#333" stroke-width="1.5"/>

  <!-- Touch Bar elements -->
  <rect x="258" y="150" width="48" height="32" rx="8" fill="#2a2a2a"/>
  <text x="282" y="170" text-anchor="middle" fill="#ccc" font-family="system-ui" font-size="10">esc</text>

  <rect x="312" y="150" width="48" height="32" rx="8" fill="#1e40af"/>
  <text x="336" y="170" text-anchor="middle" fill="#93c5fd" font-family="system-ui" font-size="10">Dark</text>

  <rect x="366" y="150" width="48" height="32" rx="8" fill="#2a2a2a"/>
  <text x="390" y="170" text-anchor="middle" fill="#ccc" font-family="system-ui" font-size="10">85%</text>

  <rect x="420" y="150" width="56" height="32" rx="8" fill="#2a2a2a"/>
  <text x="448" y="170" text-anchor="middle" fill="#34d399" font-family="system-ui" font-size="10">12:30</text>

  <rect x="482" y="150" width="48" height="32" rx="8" fill="#2a2a2a"/>
  <text x="506" y="170" text-anchor="middle" fill="#ccc" font-family="system-ui" font-size="10">Vol</text>

  <!-- JSON preview area -->
  <rect x="244" y="210" width="300" height="125" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="260" y="232" fill="#8b949e" font-family="monospace" font-size="10">JSON Output</text>
  <rect x="244" y="240" width="300" height="1" fill="#30363d"/>
  <text x="260" y="260" fill="#7c3aed" font-family="monospace" font-size="10">[</text>
  <text x="270" y="275" fill="#7c3aed" font-family="monospace" font-size="10">{</text>
  <text x="285" y="290" fill="#22c55e" font-family="monospace" font-size="10">"type"</text>
  <text x="325" y="290" fill="#e6edf3" font-family="monospace" font-size="10">:</text>
  <text x="335" y="290" fill="#f59e0b" font-family="monospace" font-size="10">"escape"</text>
  <text x="385" y="290" fill="#e6edf3" font-family="monospace" font-size="10">,</text>
  <text x="285" y="305" fill="#22c55e" font-family="monospace" font-size="10">"width"</text>
  <text x="330" y="305" fill="#e6edf3" font-family="monospace" font-size="10">:</text>
  <text x="340" y="305" fill="#3b82f6" font-family="monospace" font-size="10">64</text>
  <text x="285" y="320" fill="#22c55e" font-family="monospace" font-size="10">"align"</text>
  <text x="326" y="320" fill="#e6edf3" font-family="monospace" font-size="10">:</text>
  <text x="336" y="320" fill="#f59e0b" font-family="monospace" font-size="10">"left"</text>

  <!-- Right panel: Properties -->
  <rect x="566" y="88" width="152" height="260" fill="#0d1117"/>
  <text x="584" y="110" fill="#8b949e" font-family="system-ui" font-size="10" font-weight="600">PROPERTIES</text>

  <!-- Property fields -->
  <text x="578" y="132" fill="#64748b" font-family="system-ui" font-size="10">Type</text>
  <rect x="578" y="136" width="128" height="24" rx="4" fill="#1e293b" stroke="#30363d" stroke-width="1"/>
  <text x="590" y="152" fill="#e6edf3" font-family="system-ui" font-size="11">escape</text>

  <text x="578" y="178" fill="#64748b" font-family="system-ui" font-size="10">Title</text>
  <rect x="578" y="182" width="128" height="24" rx="4" fill="#1e293b" stroke="#30363d" stroke-width="1"/>
  <text x="590" y="198" fill="#e6edf3" font-family="system-ui" font-size="11">esc</text>

  <text x="578" y="224" fill="#64748b" font-family="system-ui" font-size="10">Width</text>
  <rect x="578" y="228" width="128" height="24" rx="4" fill="#1e293b" stroke="#30363d" stroke-width="1"/>
  <text x="590" y="244" fill="#e6edf3" font-family="system-ui" font-size="11">64</text>

  <text x="578" y="270" fill="#64748b" font-family="system-ui" font-size="10">Align</text>
  <rect x="578" y="274" width="128" height="24" rx="4" fill="#1e293b" stroke="#30363d" stroke-width="1"/>
  <text x="590" y="290" fill="#e6edf3" font-family="system-ui" font-size="11">left</text>

  <!-- Action button -->
  <rect x="578" y="310" width="128" height="28" rx="6" fill="url(#accent)" opacity="0.9"/>
  <text x="642" y="328" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11" font-weight="600">Export to MTMR</text>

  <!-- Drag indicator arrow -->
  <g opacity="0.5">
    <line x1="182" y1="138" x2="240" y2="160" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4"/>
    <polygon points="238,155 244,162 234,162" fill="#34d399"/>
  </g>
</svg>