<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#111111" rx="16" />
  
  <text x="200" y="40" font-family="sans-serif" font-size="20" font-weight="bold" fill="#f87171" text-anchor="middle">The Padding Hack</text>
  
  <g transform="translate(50, 80)">
    <!-- Container -->
    <rect x="0" y="0" width="300" height="168" fill="#333" stroke="#f87171" stroke-dasharray="4" stroke-width="2" />
    <text x="150" y="80" font-family="monospace" font-size="14" fill="#aaa" text-anchor="middle">padding-bottom: 56.25%</text>
    <text x="150" y="100" font-family="monospace" font-size="14" fill="#aaa" text-anchor="middle">position: relative</text>
    
    <!-- Absolute Inner -->
    <rect x="10" y="10" width="280" height="148" fill="#444" stroke="#fff" stroke-width="1" />
    <text x="150" y="130" font-family="monospace" font-size="14" fill="#fff" text-anchor="middle">position: absolute</text>
  </g>

  <text x="600" y="40" font-family="sans-serif" font-size="20" font-weight="bold" fill="#10b981" text-anchor="middle">The Aspect-Ratio Way</text>
  
  <g transform="translate(450, 80)">
    <rect x="0" y="0" width="300" height="168" fill="#444" stroke="#10b981" stroke-width="3" rx="4" />
    <text x="150" y="90" font-family="monospace" font-size="20" fill="#fff" text-anchor="middle">aspect-ratio: 16 / 9</text>
  </g>

</svg>
