<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>
  
  <text x="400" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#ffffff">npm vs pnpm: The node_modules Directory</text>

  <!-- npm section -->
  <g transform="translate(100, 100)">
    <rect x="0" y="0" width="250" height="300" rx="8" fill="#cb3837" opacity="0.1" stroke="#cb3837" stroke-width="2"/>
    <text x="125" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#cb3837">npm (Hoisted)</text>
    
    <rect x="20" y="50" width="210" height="30" rx="4" fill="#2a2a2a"/>
    <text x="30" y="70" font-family="monospace" font-size="14" fill="#e5e5e5">node_modules/</text>

    <rect x="40" y="90" width="190" height="25" rx="4" fill="#3a3a3a"/>
    <text x="50" y="107" font-family="monospace" font-size="12" fill="#cb3837">express</text>

    <rect x="40" y="125" width="190" height="25" rx="4" fill="#3a3a3a"/>
    <text x="50" y="142" font-family="monospace" font-size="12" fill="#cb3837">debug (phantom)</text>
    
    <rect x="40" y="160" width="190" height="25" rx="4" fill="#3a3a3a"/>
    <text x="50" y="177" font-family="monospace" font-size="12" fill="#cb3837">cookie (phantom)</text>

    <rect x="40" y="195" width="190" height="25" rx="4" fill="#3a3a3a"/>
    <text x="50" y="212" font-family="monospace" font-size="12" fill="#cb3837">qs (phantom)</text>

    <text x="125" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#a1a1aa">All dependencies are flat.</text>
    <text x="125" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#a1a1aa">Accessible without package.json.</text>
  </g>

  <!-- pnpm section -->
  <g transform="translate(450, 100)">
    <rect x="0" y="0" width="250" height="300" rx="8" fill="#f69220" opacity="0.1" stroke="#f69220" stroke-width="2"/>
    <text x="125" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#f69220">pnpm (Symlinked)</text>
    
    <rect x="20" y="50" width="210" height="30" rx="4" fill="#2a2a2a"/>
    <text x="30" y="70" font-family="monospace" font-size="14" fill="#e5e5e5">node_modules/</text>

    <rect x="40" y="90" width="190" height="25" rx="4" fill="#3a3a3a"/>
    <text x="50" y="107" font-family="monospace" font-size="12" fill="#f69220">express ➔ .pnpm/express@4.18.2/</text>

    <rect x="40" y="125" width="190" height="25" rx="4" fill="#222222"/>
    <text x="50" y="142" font-family="monospace" font-size="12" fill="#666666">.pnpm/</text>
    
    <rect x="60" y="160" width="170" height="25" rx="4" fill="#2a2a2a"/>
    <text x="70" y="177" font-family="monospace" font-size="10" fill="#e5e5e5">express@4.18.2/node_modules/express</text>

    <rect x="60" y="190" width="170" height="25" rx="4" fill="#2a2a2a"/>
    <text x="70" y="207" font-family="monospace" font-size="10" fill="#e5e5e5">express@4.18.2/node_modules/debug</text>

    <text x="125" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#a1a1aa">Strict graph. No phantom deps.</text>
    <text x="125" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#a1a1aa">Hard linked to global store.</text>
  </g>
</svg>
