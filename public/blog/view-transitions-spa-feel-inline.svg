<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="auto">
  <rect width="800" height="300" fill="#111" rx="16"/>
  <!-- Page 1 -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="200" height="200" fill="#222" rx="8" stroke="#444"/>
    <rect x="20" y="20" width="160" height="80" fill="#3b82f6" rx="4"/>
    <path d="M20,130 L180,130 M20,160 L120,160" stroke="#555" stroke-width="8" stroke-linecap="round"/>
    <text x="100" y="-15" font-family="system-ui" font-size="14" fill="#888" text-anchor="middle">Old Page</text>
  </g>
  <!-- Arrow -->
  <g transform="translate(280, 150)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#fff" stroke-width="4" opacity="0.5"/>
    <polygon points="60,-10 75,0 60,10" fill="#fff" opacity="0.5"/>
  </g>
  <!-- Browser Magic -->
  <g transform="translate(380, 50)">
    <rect x="0" y="0" width="100" height="200" fill="#1a1a1a" rx="8" stroke="#333" stroke-dasharray="4 4"/>
    <text x="50" y="100" font-family="system-ui" font-size="12" fill="#fff" text-anchor="middle">Browser</text>
    <text x="50" y="120" font-family="system-ui" font-size="12" fill="#fff" text-anchor="middle">Morph</text>
  </g>
  <!-- Arrow -->
  <g transform="translate(510, 150)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#fff" stroke-width="4" opacity="0.5"/>
    <polygon points="60,-10 75,0 60,10" fill="#fff" opacity="0.5"/>
  </g>
  <!-- Page 2 -->
  <g transform="translate(600, 50)">
    <rect x="0" y="0" width="200" height="200" fill="#222" rx="8" stroke="#444"/>
    <rect x="20" y="20" width="80" height="80" fill="#3b82f6" rx="4"/>
    <path d="M120,40 L180,40 M120,70 L160,70 M20,130 L180,130 M20,160 L180,160" stroke="#555" stroke-width="8" stroke-linecap="round"/>
    <text x="100" y="-15" font-family="system-ui" font-size="14" fill="#888" text-anchor="middle">New Page</text>
  </g>
</svg>
