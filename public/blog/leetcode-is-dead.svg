<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#171717"/>
    </linearGradient>
    <linearGradient id="lcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffa116"/>
      <stop offset="100%" style="stop-color:#ff6b00"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#bgGrad)"/>
  
  <!-- LeetCode logo with X -->
  <g transform="translate(320, 60)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="#27272a" stroke="#ffa116" stroke-width="2"/>
    <text x="80" y="35" font-family="monospace" font-size="16" fill="#ffa116" text-anchor="middle" font-weight="bold">LeetCode</text>
    <line x1="130" y1="15" x2="150" y2="65" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
    <line x1="150" y1="15" x2="130" y2="65" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- ChatGPT solving problem -->
  <g transform="translate(520, 80)">
    <rect x="0" y="0" width="180" height="120" rx="8" fill="#1a1a1a" stroke="#10a37f" stroke-width="2"/>
    <text x="90" y="25" font-family="monospace" font-size="10" fill="#10a37f" text-anchor="middle">ChatGPT</text>
    <text x="12" y="50" font-family="monospace" font-size="9" fill="#22c55e">def twoSum(nums, target):</text>
    <text x="12" y="65" font-family="monospace" font-size="9" fill="#e5e5e5">    seen = {}</text>
    <text x="12" y="80" font-family="monospace" font-size="9" fill="#e5e5e5">    for i, n in enumerate(nums):</text>
    <text x="12" y="95" font-family="monospace" font-size="9" fill="#3b82f6">        # O(n) solution...</text>
    <text x="12" y="110" font-family="monospace" font-size="9" fill="#22c55e">✓ 0.3 seconds</text>
  </g>
  
  <!-- Developer struggling -->
  <g transform="translate(100, 160)">
    <rect x="0" y="0" width="180" height="120" rx="6" fill="#1a1a1a" stroke="#333"/>
    <text x="90" y="25" font-family="monospace" font-size="10" fill="#888" text-anchor="middle">Interview</text>
    <text x="12" y="50" font-family="monospace" font-size="9" fill="#555">// Reverse binary tree...</text>
    <text x="12" y="70" font-family="monospace" font-size="9" fill="#f97316">// Wait, left or right?</text>
    <text x="12" y="90" font-family="monospace" font-size="9" fill="#ef4444">// I practiced this...</text>
    <text x="12" y="110" font-family="monospace" font-size="9" fill="#ef4444">sweating intensifies</text>
  </g>
  
  <!-- Better approach icons -->
  <g transform="translate(100, 310)">
    <rect x="0" y="0" width="100" height="50" rx="4" fill="#27272a" stroke="#22c55e" stroke-width="1"/>
    <text x="50" y="20" font-family="monospace" font-size="8" fill="#22c55e" text-anchor="middle">Code Review</text>
    <text x="50" y="38" font-family="monospace" font-size="8" fill="#888" text-anchor="middle">✓ Real skill</text>
  </g>
  
  <g transform="translate(220, 310)">
    <rect x="0" y="0" width="100" height="50" rx="4" fill="#27272a" stroke="#3b82f6" stroke-width="1"/>
    <text x="50" y="20" font-family="monospace" font-size="8" fill="#3b82f6" text-anchor="middle">Pair Program</text>
    <text x="50" y="38" font-family="monospace" font-size="8" fill="#888" text-anchor="middle">✓ Real skill</text>
  </g>
  
  <g transform="translate(340, 310)">
    <rect x="0" y="0" width="100" height="50" rx="4" fill="#27272a" stroke="#f97316" stroke-width="1"/>
    <text x="50" y="20" font-family="monospace" font-size="8" fill="#f97316" text-anchor="middle">Debug Challenge</text>
    <text x="50" y="38" font-family="monospace" font-size="8" fill="#888" text-anchor="middle">✓ Real skill</text>
  </g>
  
  <!-- Brain with AI -->
  <g transform="translate(540, 260)">
    <circle cx="60" cy="50" r="45" fill="#27272a" stroke="#10a37f" stroke-width="2"/>
    <text x="60" y="45" font-family="monospace" font-size="10" fill="#10a37f" text-anchor="middle">AI</text>
    <text x="60" y="60" font-family="monospace" font-size="8" fill="#555" text-anchor="middle">has answers</text>
  </g>
  
  <text x="400" y="390" font-family="system-ui, sans-serif" font-size="12" fill="#555" text-anchor="middle">The test is compromised</text>
</svg>