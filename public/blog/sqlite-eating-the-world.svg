<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#171717"/>
    </linearGradient>
    <linearGradient id="sqliteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003b57"/>
      <stop offset="100%" style="stop-color:#029ed5"/>
    </linearGradient>
    <linearGradient id="postgresGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#336791"/>
      <stop offset="100%" style="stop-color:#5c9fb8"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#bgGrad)"/>
  
  <!-- SQLite database icon -->
  <g transform="translate(340, 60)">
    <rect x="0" y="0" width="120" height="100" rx="8" fill="url(#sqliteGrad)"/>
    <rect x="10" y="20" width="100" height="60" rx="4" fill="#002b3d"/>
    <text x="60" y="58" font-family="monospace" font-size="14" fill="#029ed5" text-anchor="middle">.db</text>
    <circle cx="100" cy="15" r="8" fill="#22c55e"/>
  </g>
  
  <!-- Postgres sweating -->
  <g transform="translate(540, 80)">
    <circle cx="50" cy="50" r="45" fill="url(#postgresGrad)" opacity="0.5"/>
    <text x="50" y="55" font-family="monospace" font-size="12" fill="#fff" text-anchor="middle">PG</text>
    <!-- Sweat drops -->
    <ellipse cx="95" cy="35" rx="3" ry="6" fill="#5c9fb8" opacity="0.6"/>
    <ellipse cx="100" cy="50" rx="2" ry="5" fill="#5c9fb8" opacity="0.4"/>
  </g>
  
  <!-- Edge nodes with SQLite -->
  <g transform="translate(100, 180)">
    <rect x="0" y="0" width="60" height="50" rx="4" fill="#27272a" stroke="#029ed5" stroke-width="1"/>
    <text x="30" y="30" font-family="monospace" font-size="8" fill="#029ed5" text-anchor="middle">edge</text>
  </g>
  <g transform="translate(180, 200)">
    <rect x="0" y="0" width="60" height="50" rx="4" fill="#27272a" stroke="#029ed5" stroke-width="1"/>
    <text x="30" y="30" font-family="monospace" font-size="8" fill="#029ed5" text-anchor="middle">edge</text>
  </g>
  
  <!-- Browser with SQLite -->
  <g transform="translate(100, 280)">
    <rect x="0" y="0" width="140" height="80" rx="6" fill="#1a1a1a" stroke="#333"/>
    <rect x="0" y="0" width="140" height="18" rx="6" fill="#27272a"/>
    <circle cx="12" cy="9" r="4" fill="#ff5f56"/>
    <circle cx="24" cy="9" r="4" fill="#ffbd2e"/>
    <circle cx="36" cy="9" r="4" fill="#27c93f"/>
    <text x="70" y="50" font-family="monospace" font-size="10" fill="#029ed5" text-anchor="middle">WASM SQLite</text>
  </g>
  
  <!-- Turso/libsql mention -->
  <g transform="translate(280, 300)">
    <rect x="0" y="0" width="100" height="40" rx="4" fill="#27272a" stroke="#f97316" stroke-width="1"/>
    <text x="50" y="25" font-family="monospace" font-size="10" fill="#f97316" text-anchor="middle">libsql</text>
  </g>
  
  <!-- Code snippet -->
  <g transform="translate(500, 180)">
    <rect x="0" y="0" width="220" height="100" rx="6" fill="#1a1a1a" stroke="#333"/>
    <text x="12" y="24" font-family="monospace" font-size="10" fill="#22c55e">PRAGMA</text>
    <text x="65" y="24" font-family="monospace" font-size="10" fill="#e5e5e5">journal_mode</text>
    <text x="145" y="24" font-family="monospace" font-size="10" fill="#f97316">=</text>
    <text x="155" y="24" font-family="monospace" font-size="10" fill="#3b82f6">WAL</text>
    <text x="12" y="44" font-family="monospace" font-size="9" fill="#555">-- Write-Ahead Logging</text>
    <text x="12" y="64" font-family="monospace" font-size="9" fill="#22c55e">-- 1000s of concurrent reads</text>
    <text x="12" y="84" font-family="monospace" font-size="9" fill="#22c55e">-- Dozens of writes/sec</text>
  </g>
  
  <!-- Connection lines -->
  <line x1="160" y1="230" x2="340" y2="160" stroke="#029ed5" stroke-width="1" stroke-dasharray="4" opacity="0.4"/>
  <line x1="240" y1="250" x2="340" y2="160" stroke="#029ed5" stroke-width="1" stroke-dasharray="4" opacity="0.4"/>
  <line x1="170" y1="320" x2="340" y2="160" stroke="#029ed5" stroke-width="1" stroke-dasharray="4" opacity="0.4"/>
  
  <!-- Title text -->
  <text x="400" y="380" font-family="system-ui, sans-serif" font-size="14" fill="#555" text-anchor="middle">SQLite is everywhere</text>
</svg>