<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/> <!-- Green -->
      <stop offset="100%" style="stop-color:#a855f7"/> <!-- Purple -->
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <circle cx="150" cy="500" r="300" fill="#10b981" opacity="0.03"/>
  <circle cx="1050" cy="130" r="250" fill="#a855f7" opacity="0.03"/>

  <!-- CLI Window Illustration -->
  <g transform="translate(850, 180)">
    <rect x="0" y="0" width="220" height="150" rx="10" fill="#18181b" stroke="#3f3f46" stroke-width="2"/>
    <!-- Mac window buttons -->
    <circle cx="20" cy="20" r="6" fill="#ef4444"/>
    <circle cx="40" cy="20" r="6" fill="#eab308"/>
    <circle cx="60" cy="20" r="6" fill="#22c55e"/>
    
    <!-- Code lines -->
    <rect x="20" y="45" width="100" height="8" rx="4" fill="#a855f7"/>
    <rect x="20" y="65" width="140" height="8" rx="4" fill="#52525b"/>
    <rect x="20" y="85" width="80" height="8" rx="4" fill="#52525b"/>
    <rect x="20" y="105" width="160" height="8" rx="4" fill="#10b981"/>
  </g>

  <!-- Badges -->
  <g transform="translate(1020, 380)">
    <rect x="0" y="0" width="100" height="35" rx="6" fill="#a855f7" opacity="0.2" stroke="#a855f7" stroke-width="1"/>
    <text x="50" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#a855f7">Ergonomics</text>
  </g>

  <g transform="translate(850, 380)">
    <rect x="0" y="0" width="150" height="35" rx="6" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1"/>
    <text x="75" y="24" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#10b981">Terminal UI</text>
  </g>

  <rect x="80" y="280" width="120" height="4" rx="2" fill="url(#accent)" opacity="0.8"/>
  <text x="80" y="340" font-family="system-ui, sans-serif" font-size="44" font-weight="700" fill="#ffffff">Designing Developer Tools UX</text>
  <text x="80" y="400" font-family="system-ui, sans-serif" font-size="28" fill="#a1a1aa">CLI ergonomics & TUI patterns</text>
  <text x="80" y="450" font-family="system-ui, sans-serif" font-size="20" fill="#71717a">crativo.xyz</text>
</svg>
