<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </linearGradient>
    <radialGradient id="gasGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ff00;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#00ff00;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="vibeGlow" cx="80%" cy="20%" r="40%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Grid -->
  <g stroke="#00ff00" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>

  <!-- Big glowing blobs -->
  <circle cx="400" cy="300" r="250" fill="url(#gasGlow)"/>
  <circle cx="700" cy="100" r="200" fill="url(#vibeGlow)"/>

  <!-- Logo area -->
  <g transform="translate(50, 40)">
    <rect width="60" height="60" rx="12" fill="#000" stroke="#00ff00" stroke-width="3" filter="url(#glow)"/>
    <text x="30" y="42" font-family="monospace" font-size="32" font-weight="900" fill="#00ff00" text-anchor="middle">ZD</text>
    <text x="130" y="40" font-family="monospace" font-size="28" font-weight="900" fill="#ffffff" letter-spacing="2">ZOMBIE DONKEYS</text>
    <text x="130" y="65" font-family="monospace" font-size="14" font-weight="400" fill="#00ff00">PURIFICATION PROTOCOL 2069</text>
  </g>

  <!-- Central Game Mockup -->
  <g transform="translate(150, 150)">
    <rect width="500" height="300" rx="20" fill="#111" stroke="#333" stroke-width="2"/>
    
    <!-- Viewport -->
    <rect x="10" y="10" width="480" height="280" rx="10" fill="#050505"/>
    
    <!-- Reticle -->
    <circle cx="250" cy="150" r="10" fill="none" stroke="#ff0000" stroke-width="2" stroke-dasharray="2 2"/>
    
    <!-- Bio-Gaster ViewModel -->
    <g transform="translate(350, 200)">
      <rect x="0" y="0" width="80" height="40" fill="#333" rx="5"/>
      <rect x="10" y="-10" width="60" height="20" fill="#444" rx="5"/>
      <!-- Cheeks -->
      <circle cx="20" cy="0" r="15" fill="#fbb"/>
      <circle cx="60" cy="0" r="15" fill="#fbb"/>
      <!-- Gas cloud -->
      <circle cx="40" cy="-40" r="20" fill="#0f0" opacity="0.6" filter="url(#glow)"/>
    </g>
    
    <!-- Donkey Sprite -->
    <g transform="translate(100, 100)">
      <rect width="40" height="60" fill="#3a4a3a"/>
      <rect x="5" y="5" width="10" height="10" fill="#f00"/>
      <rect x="25" y="5" width="10" height="10" fill="#f00"/>
      <text x="20" y="80" font-family="monospace" font-size="10" fill="#f00" text-anchor="middle">BAD VIBES</text>
    </g>
    
    <!-- UI -->
    <text x="20" y="30" font-family="monospace" font-size="12" fill="#0f0">GAS: 88%</text>
    <text x="20" y="50" font-family="monospace" font-size="12" fill="#f00">HEALTH: 100%</text>
    <text x="400" y="30" font-family="monospace" font-size="12" fill="#ff0">LVL: 69</text>
  </g>

  <!-- Tagline -->
  <text x="400" y="520" font-family="monospace" font-size="18" fill="#00ff00" text-anchor="middle" letter-spacing="4" filter="url(#glow)">GAS 'EM UP. SAVE THE WORLD.</text>
  
  <text x="750" y="580" font-family="monospace" font-size="10" fill="#444" text-anchor="end">FROM JOSE WITH LOVE</text>
</svg>