<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#111111" rx="16" />
  <text x="400" y="60" font-family="sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">HSL vs OKLCH Gradients</text>
  
  <text x="50" y="140" font-family="sans-serif" font-size="18" fill="#aaaaaa">HSL (Often features "muddy" middle)</text>
  <rect x="50" y="160" width="700" height="60" rx="8" fill="url(#hslGradient)" />
  
  <text x="50" y="270" font-family="sans-serif" font-size="18" fill="#aaaaaa">OKLCH (Perceptually uniform)</text>
  <rect x="50" y="290" width="700" height="60" rx="8" fill="url(#oklchGradient)" />

  <defs>
    <!-- Simulating HSL muddy transition with RGB stops -->
    <linearGradient id="hslGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0000ff" />
      <stop offset="50%" stop-color="#808080" />
      <stop offset="100%" stop-color="#ffff00" />
    </linearGradient>
    <linearGradient id="oklchGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0000ff" />
      <stop offset="50%" stop-color="#ffb6c1" />
      <stop offset="100%" stop-color="#ffff00" />
    </linearGradient>
  </defs>
</svg>
